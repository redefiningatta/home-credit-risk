x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: orchestration/airflow/Dockerfile
  image: home-credit-airflow:latest
  environment:
    DOCKER_API_VERSION: "1.44"
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: 30
    GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/credentials/home-credit-app-sa.json
    GCP_PROJECT_ID: ${GCP_PROJECT_ID}
    GCS_BUCKET_NAME: ${GCS_BUCKET_NAME}
    KAGGLE_USERNAME: ${KAGGLE_USERNAME}
    KAGGLE_KEY: ${KAGGLE_KEY}
  volumes:
    - ./orchestration/airflow/dags:/opt/airflow/dags
    - ./orchestration/airflow/logs:/opt/airflow/logs
    - ./orchestration/airflow/plugins:/opt/airflow/plugins
    - ./credentials:/opt/airflow/credentials
    - /var/run/docker.sock:/var/run/docker.sock

  user: "${AIRFLOW_UID:-50000}:1001"

  group_add:
    - "1001"
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - home-credit-network

services:
  postgres:
    image: postgres:15
    container_name: home-credit-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - home-credit-network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    container_name: home-credit-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin \
          --firstname Peter \
          --lastname Okpeh \
          --role Admin \
          --email peter.a.okpeh@gmail.com \
          --password admin
    restart: on-failure

  airflow-webserver:
    <<: *airflow-common
    container_name: home-credit-airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    container_name: home-credit-airflow-scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  ingestion:
    build:
      context: .
      dockerfile: ingestion/Dockerfile
    container_name: home-credit-ingestion
    env_file:
      - .env
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/credentials/home-credit-app-sa.json
    volumes:
      - ./data/raw:/app/data/raw
      - ./credentials:/app/credentials
    networks:
      - home-credit-network
    profiles:
      - ingestion

networks:
  home-credit-network:
    driver: bridge

volumes:
  postgres-data:
  airflow-logs: